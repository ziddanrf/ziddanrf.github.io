 <!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width initial-scale=1.0 user-scalable=no">
    <link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
    <style>
      /* Making Android Logo with CSS */
/* Dibuat pada tanggal 21 Februari 2021 */
/* by Ziddan RF */


*{
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body{
  position: absolute;
  transform: translate(-50%, -50%);
  top: 50%;
  left: 50%;
}
.antendiv{
  position: absolute;
  top: -10px;
  display: flex;
  flex-direction: row;
  width: 100%;
  height: auto;
  padding: 10px;
  justify-content: center;
}
.anten1{
  margin-right: 20px;
  width: 30px;
  height: 4px;
  background-color: #a4c639;
  transform: rotate(50deg);
  border-radius: 20px;
}
.anten2{
  width: 30px;
  height: 4px;
  transform: rotate(-50deg);
  background-color: #a4c639;
  border-radius: 20px;
}
.container{
  display: flex;
  flex-direction: column;
  align-items: center;
  position: absolute;
  transform: translate(-50%, -50%);
  top: 50%;
  left: 50%;
}

 .head{
   width: 100px;
   height: 50px;
   background-color:  #a4c639;
   border-radius: 50px 50px 0 0;
 }
 .classeye{
   display: flex;
   flex-direction: row;
   justify-content: center;
   width: 100%;
   height: auto;
   margin-top: 25%;
 }
 .eye1{
   margin-right: 30px;
   left: 10%;
   width: 10px;
   height: 10px;
   border-radius: 50%;
   background-color: white;
 }
 .eye2{
   width: 10px;
   height: 10px;
   border-radius: 50%;
   background-color: white;
 }
 .body{
   display: flex;
   flex-direction: columns;
 }
 .body1{
   width: 100px;
   height: 85px;
   margin-top: 5px;
   background-color: #a4c639;
   border-radius: 0 0 15px 15px;
   margin: 5px;
 }
 
 .hand{
   margin-top: 2px;
   width: 23px;
   height: 70px;
   background-color: #a4c639;
   border-radius: 20px;
 }
 .con{
   display: flex;
   flex-direction: row;
   width: 85px;
   justify-content: center;
   margin-top: -40px;
 }
 .leg{
   width: 23px;
   height: 60px;
   margin: 10px;
   background-color: #a4c639;
   border-radius: 50px;
 } 
 .button{
   display: flex;
   justify-content: center;
   margin-top: 280px;
 }
 .html{
   width: 100px;
   padding: 10px 0;
   border-radius: 15px;
   border: 1px solid #a4c639;
   background-color: transparent;
   color: #000;
   outline: none;
   margin-right: 20px;
 }
 .css{
   width: 100px;
   color: #000;
   padding: 10px;
   border-radius: 15px;
   border: 1px solid #a4c639;
   background-color: transparent;
   outline: none;
   margin-left: 20px;
 }
 
 a{
   text-decoration: none;
   color: #000;
   display: block;
 }
 .judul{
   font-family: 'Open Sans', sans-serif;
   text-align: center;
   margin-top: -40px;
 }
 
 button:hover{
   background-color: #888;
   color: white;
 }
    </style>
    <title>Android Logo</title>
  </head>
  <body>
    <h2 class="judul">Android Logo With Css</h2>
    <div class="container">
    <div class="antendiv">
      <div class="anten1"></div>
      <div class="anten2"></div>
    </div>
      <div class="head">
        <div class="classeye">
          <div class="eye1"></div>
          <div class="eye2"></div>
        </div>
      </div>
      <div class="body">
        <div class="hand"></div>
        <div class="body1"></div>
        <div class="hand"></div>
      </div>
      <div class="con">
      <div class="leg"></div>
      <div class="leg"></div>
    </div>
    </div>
    <div class="button">
      <button class="html"><a href="#">HTML Code</a></button>
      <button class="css"><a href="#">CSS Code</a></button>
    </div>
  </body>
</html>
